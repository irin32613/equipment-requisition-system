<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock อุปกรณ์ปัจจุบัน</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Stock อุปกรณ์ปัจจุบัน</h1>
        
        <div class="nav-menu">
            <a href="{{ url_for('index') }}" class="nav-button">หน้าแรก</a>
            <a href="{{ url_for('requisition_form') }}" class="nav-button">ฟอร์มเบิกอุปกรณ์</a>
            <a href="{{ url_for('history') }}" class="nav-button">ประวัติการเบิก</a>
        </div>
        
        <table class="data-table">
            <thead>
                <tr>
                    <th>ชื่ออุปกรณ์</th>
                    <th>จำนวนคงเหลือ</th>
                </tr>
            </thead>
            <tbody>
                {% for equipment in equipments %}
                <tr>
                    <td>{{ equipment.name }}</td>
                    <td>{{ equipment.quantity }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
